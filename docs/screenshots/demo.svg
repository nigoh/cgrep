  <line x1="658" y1="110" x2="658" y2="530" stroke="#6272a4" stroke-width="1"/>

  <!-- Preview title -->
  <text x="665" y="126" class="pur bold">Preview</text>
  <text x="940" y="126" class="dim">[p]</text>

  <text x="665" y="148" class="fg bold">Container Orchestration Guide</text>
  <text x="665" y="164" class="dim">Confluence · DS</text>
  <line x1="665" y1="172" x2="990" y2="172" stroke="#44475a" stroke-width="1"/>

  <text x="665" y="190" class="fg">This guide covers best practices for</text>
  <text x="665" y="206" class="fg">container orchestration using Kubernetes</text>
  <text x="665" y="222" class="fg">in enterprise environments.</text>

  <text x="665" y="248" class="yel bold">Overview</text>
  <text x="665" y="264" class="fg">Kubernetes provides a framework to run</text>
  <text x="665" y="280" class="fg">distributed systems resiliently. It takes</text>
  <text x="665" y="296" class="fg">care of scaling and failover for your</text>
  <text x="665" y="312" class="fg">application, provides deployment patterns,</text>
  <text x="665" y="328" class="fg">and more.</text>

  <text x="665" y="354" class="yel bold">Key Concepts</text>
  <text x="665" y="370" class="fg">• </text><text x="677" y="370" class="cyan">Pods</text><text x="704" y="370" class="fg">: smallest deployable units</text>
  <text x="665" y="386" class="fg">• </text><text x="677" y="386" class="cyan">Services</text><text x="730" y="386" class="fg">: stable networking layer</text>
  <text x="665" y="402" class="fg">• </text><text x="677" y="402" class="cyan">Deployments</text><text x="751" y="402" class="fg">: manage replica sets</text>
  <text x="665" y="418" class="fg">• </text><text x="677" y="418" class="cyan">ConfigMaps</text><text x="746" y="418" class="fg">: external configuration</text>
  <text x="665" y="434" class="fg">• </text><text x="677" y="434" class="cyan">Namespaces</text><text x="751" y="434" class="fg">: logical isolation</text>

  <text x="665" y="460" class="dim">─────────────────────────────────</text>
  <text x="665" y="476" class="dim">URL: https://confluence.example.com/</text>
  <text x="665" y="492" class="dim">     display/DS/container-orch</text>
  <text x="665" y="510" class="dim">  y: copy URL   Enter: open in browser</text>

